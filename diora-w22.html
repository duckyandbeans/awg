<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essay Topic Spinner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2c3e50;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 0;
            color: #34495e;
            font-size: 2rem;
        }

        .wheel-wrapper {
            position: relative;
            margin: 30px 0;
            width: 350px;
            height: 350px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            /* The transition handles the smooth spinning animation */
            transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
        }

        /* The triangle pointer pointing to the winning slice */
        .pointer {
            position: absolute;
            top: 50%;
            right: -25px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 35px solid #2c3e50;
            z-index: 10;
            filter: drop-shadow(-2px 2px 2px rgba(0,0,0,0.2));
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #3498db;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-left: 6px solid #2ecc71;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1.15rem;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .result-box h3 {
            margin: 0 0 10px 0;
            color: #27ae60;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-box p {
            margin: 0;
            font-weight: 500;
        }

        /* Responsive scaling */
        @media (max-width: 480px) {
            .wheel-wrapper {
                width: 280px;
                height: 280px;
            }
            .pointer {
                right: -15px;
                border-right: 25px solid #2c3e50;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Essay Topic Spinner</h1>
        
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel" width="800" height="800"></canvas>
        </div>

        <button id="spinBtn" onclick="spinWheel()">Spin the Wheel</button>

        <div id="result" class="result-box">
            <p>Click "SPIN THE WHEEL" to select your random essay topic!</p>
        </div>
    </div>

    <script>
        // Data arrays
        const shortLabels = [
            "Social Media",
            "Music & Focus",
            "Public Speaking",
            "Great Teacher"
        ];

        const fullTopics = [
            "Are individuals on social media the same people they are in real life, or do platforms encourage us to create 'false' personas?",
            "How music affects mood and focus while studying.",
            "How I beat my fear of public speaking.",
            "What makes a great teacher."
        ];

        const colors = ['#e74c3c', '#2ecc71', '#3498db', '#f1c40f'];
        
        // Canvas Setup
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width / 2;

        // Draw the initial wheel
        function drawWheel() {
            ctx.clearRect(0, 0, width, height);

            const numSlices = shortLabels.length;
            const sliceAngle = (2 * Math.PI) / numSlices;

            for (let i = 0; i < numSlices; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                // Draw Slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();

                // Slice Borders
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + (sliceAngle / 2));
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                
                // Darken text for yellow slice for better contrast
                if (i === 3) ctx.fillStyle = "#2c3e50"; 
                
                ctx.font = "bold 36px 'Segoe UI', sans-serif";
                
                // Position text outward from center
                ctx.fillText(shortLabels[i], radius / 1.6, 0); 
                ctx.restore();
            }

            // Draw center decorative circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#2c3e50";
            ctx.stroke();
        }

        // State variables for spinning
        let currentRotation = 0;
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spinBtn');
            const resultBox = document.getElementById('result');
            
            btn.disabled = true;
            resultBox.innerHTML = "<p>Spinning...</p>";
            resultBox.style.borderColor = "#95a5a6";

            // Randomize spin: At least 5 full spins (1800deg) + random angle
            const randomSpins = Math.floor(Math.random() * 5) + 5; 
            const randomDegrees = Math.floor(Math.random() * 360);
            
            currentRotation += (randomSpins * 360) + randomDegrees;

            // Apply CSS rotation to the canvas
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Wait for the CSS transition (4 seconds) to finish
            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false;

                // Calculate which slice landed on the pointer (Right side = 0 degrees)
                const actualDeg = currentRotation % 360;
                
                // When canvas rotates clockwise, the point originally at (360 - actualDeg) moves to 0 deg
                const winningAngle = (360 - actualDeg) % 360;
                
                // Each slice is 90 degrees
                const winningIndex = Math.floor(winningAngle / 90);

                // Display Winner
                resultBox.style.borderColor = colors[winningIndex];
                resultBox.innerHTML = `
                    <h3 style="color: ${colors[winningIndex] === '#f1c40f' ? '#f39c12' : colors[winningIndex]}">Your Topic:</h3>
                    <p>"${fullTopics[winningIndex]}"</p>
                `;

            }, 4000); // 4000ms = 4s transition
        }

        // Initialize the wheel when the page loads
        window.onload = drawWheel;
    </script>
</body>
</html>
