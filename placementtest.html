        // Function to dynamically render the quiz HTML
        function renderQuiz() {
            const container = document.getElementById('questions-container');
            
            quizData.forEach((item, index) => {
                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';
                
                // Format line breaks for A/B dialogues
                const formattedQuestion = item.q.replace(/\n/g, '<br>');
                
                let optionsHTML = '';
                for (const [key, value] of Object.entries(item.options)) {
                    optionsHTML += `
                        <label>
                            <input type="radio" name="q${index}" value="${key}">
                            <strong>${key}</strong> ${value}
                        </label>
                    `;
                }

                questionBlock.innerHTML = `
                    <div class="question-text">${formattedQuestion}</div>
                    <div class="options">${optionsHTML}</div>
                `;
                container.appendChild(questionBlock);
            });
        }

        // Determine CEFR level based on Headway placement brackets
        function getCEFRLevel(score) {
            if (score <= 15) return "Beginner (Pre-A1)";
            if (score <= 30) return "Elementary (A1)";
            if (score <= 45) return "Pre-Intermediate (A2)";
            if (score <= 60) return "Intermediate (B1)";
            if (score <= 75) return "Upper-Intermediate (B2)";
            if (score <= 90) return "Advanced (C1)";
            return "Proficient (C2)";
        }

        // Calculate score
        function calculateScore() {
            const name = document.getElementById('student-name').value;
            if (!name) {
                alert("Please enter your name before submitting.");
                return;
            }

            let score = 0;
            
            // Loop through rendered questions
            quizData.forEach((_, index) => {
                const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
                if (selectedOption) {
                    // Check against the master answer key array
                    if (selectedOption.value === answerKey[index]) {
                        score++;
                    }
                }
            });

            // If you only loaded 10 questions for testing but want to simulate a full 100 point score:
            // Remove this multiplier once you input all 100 questions.
            let simulatedScore = Math.round((score / quizData.length) * 100);

            // Populate the Results Card
            document.getElementById('display-name').innerText = name;
            document.getElementById('score-number').innerText = simulatedScore;
            document.getElementById('cefr-level').innerText = getCEFRLevel(simulatedScore);

            // Hide form, show results
            document.getElementById('quiz-form').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // Generate and download screenshot
        function downloadScreenshot() {
            const resultCard = document.getElementById('result-card');
            const name = document.getElementById('student-name').value.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const cefr = document.getElementById('cefr-level').innerText.split(' ')[1].replace(/[^a-zA-Z0-9]/g, '');

            html2canvas(resultCard).then(canvas => {
                const link = document.createElement('a');
                link.download = `Score_${cefr}_${name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Initialize quiz on load
        window.onload = renderQuiz;
    </script>
</body>
</html>
